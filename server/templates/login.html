<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Media Player — Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-base: #0f0f1a;
            --bg-surface: rgba(25, 25, 50, 0.6);
            --bg-card: rgba(30, 30, 60, 0.4);
            --accent-primary: #7c5cfc;
            --accent-secondary: #5ce0d8;
            --accent-glow: rgba(124, 92, 252, 0.3);
            --text-primary: #e8e6f0;
            --text-secondary: #9895ad;
            --border-glass: rgba(255, 255, 255, 0.08);
            --error: #ff6b8a;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(124, 92, 252, 0.15), transparent),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(92, 224, 216, 0.1), transparent),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(124, 92, 252, 0.05), transparent);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(124, 92, 252, 0.15);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(92, 224, 216, 0.12);
            bottom: -50px; right: -50px;
            animation-delay: -7s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: rgba(252, 92, 156, 0.1);
            top: 50%; right: 20%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.02); }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 48px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 24px var(--accent-glow);
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 8px 24px var(--accent-glow); }
            50% { box-shadow: 0 8px 40px rgba(124, 92, 252, 0.5); }
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(15, 15, 30, 0.5);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
        }

        .input-wrapper input:focus + .icon,
        .input-wrapper input:focus ~ .icon {
            opacity: 1;
        }

        .input-wrapper input::placeholder {
            color: rgba(152, 149, 173, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-primary), #6c4ce0);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-login.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            padding: 12px 16px;
            background: rgba(255, 107, 138, 0.1);
            border: 1px solid rgba(255, 107, 138, 0.2);
            border-radius: 10px;
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: errorShake 0.4s ease;
        }

        .error-message.visible {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Footer */
        .footer-text {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 24px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">📺</div>
                <h1>Smart TV Player</h1>
                <p>Панель управления медиа</p>
            </div>

            <div class="error-message" id="errorMessage">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username"
                               placeholder="Введите логин" required autocomplete="username">
                        <span class="icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password"
                               placeholder="Введите пароль" required autocomplete="current-password">
                        <span class="icon">🔒</span>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Войти
                </button>
            </form>

            <div class="footer-text">
                Smart TV Media Player v1.0
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');

        function showError(msg) {
            errorText.textContent = msg;
            errorEl.classList.add('visible');
        }

        function hideError() {
            errorEl.classList.remove('visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Введите логин и пароль');
                return;
            }

            loginBtn.classList.add('loading');
            loginBtn.textContent = '';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка авторизации');
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = 'Войти';
                    return;
                }

                // Success — redirect to dashboard
                localStorage.setItem('auth_token', data.token);
                window.location.href = '/dashboard';

            } catch (err) {
                showError('Ошибка подключения к серверу');
                loginBtn.classList.remove('loading');
                loginBtn.textContent = 'Войти';
            }
        });

        // Focus first input
        document.getElementById('username').focus();
    </script>
</body>
</html>
